services:
  # Redis for AI summary caching and rate limiting
  redis:
    image: redis:7-alpine
    container_name: code-analytics-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - code-analytics-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: code-analytics-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - LOG_LEVEL=INFO
      - DEBUG=false
    volumes:
      - ./repositories:/repositories:ro  # Mount for scanning repositories
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - code-analytics-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  code-analytics-network:
    driver: bridge
